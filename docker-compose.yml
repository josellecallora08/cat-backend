services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cat_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # FastAPI Backend
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    command: sh -c "python migrate.py && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    environment:
      CAT_DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/cat_db
      CAT_DEBUG: "false"
      CAT_JWT_SECRET: ${CAT_JWT_SECRET:-cat-docker-secret-change-in-production}
      CAT_JWT_EXPIRY_HOURS: "24"
      CAT_LLM_BASE_URL: ${CAT_LLM_BASE_URL:-https://api.groq.com/openai/v1}
      CAT_LLM_MODEL: ${CAT_LLM_MODEL:-llama-3.3-70b-versatile}
      CAT_LLM_API_KEY: ${CAT_LLM_API_KEY:-}
      CAT_LLM_TIMEOUT: "30.0"
      CAT_LLM_TEMPERATURE: "0.7"
      CAT_LLM_MAX_TOKENS: "1024"
      CAT_ELEVENLABS_API_KEY: ${CAT_ELEVENLABS_API_KEY:-}
      CAT_ELEVENLABS_VOICE_ID: ${CAT_ELEVENLABS_VOICE_ID:-pFZP5JQG7iQjIQuC4Bku}
      CAT_TTS_PROVIDER: ${CAT_TTS_PROVIDER:-auto}
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
